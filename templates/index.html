<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Prediction</title>


    <link rel="stylesheet" 
    href="{{ url_for('static', filename='css/style.css') }}">


    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


</head>



<body>



<div class="container">



    <div class="header">


        <h1>

            <i class="fa-solid fa-chart-line"></i>

            CUSTOMER CHURN PREDICTION SYSTEM

        </h1>



        <p class="subtitle">

            Enter customer details to predict the likelihood of churn.

        </p>


    </div>





<form id="predictionForm">



<div class="form-grid">





<!-- Gender -->

<div class="form-group">

<label>

<i class="fa-solid fa-user"></i>

Gender

</label>


<select id="gender" required>

<option value="">Select Gender</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

</select>


</div>





<!-- Senior Citizen -->

<div class="form-group">


<label>

<i class="fa-solid fa-person-cane"></i>

Senior Citizen

</label>


<select id="SeniorCitizen" required>


<option value="">Select</option>

<option value="0">No</option>

<option value="1">Yes</option>


</select>


</div>





<!-- Partner -->

<div class="form-group">


<label>

<i class="fa-solid fa-heart"></i>

Partner

</label>



<select id="Partner" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>


</select>


</div>





<!-- Dependents -->


<div class="form-group">


<label>

<i class="fa-solid fa-people-group"></i>

Dependents

</label>



<select id="Dependents" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>


</select>



</div>






<!-- Tenure -->


<div class="form-group">


<label>

<i class="fa-solid fa-calendar-days"></i>

Tenure (Months)

</label>



<input

type="number"

id="tenure"

min="0"

placeholder="Example: 24"

required>


</div>






<!-- Phone -->

<div class="form-group">


<label>

<i class="fa-solid fa-phone"></i>

Phone Service

</label>



<select id="PhoneService" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>


</select>


</div>






<!-- Multiple Lines -->

<div class="form-group">


<label>

<i class="fa-solid fa-phone-volume"></i>

Multiple Lines

</label>



<select id="MultipleLines" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No phone service">
No phone service
</option>


</select>


</div>







<!-- Internet -->

<div class="form-group">


<label>

<i class="fa-solid fa-wifi"></i>

Internet Service

</label>



<select id="InternetService" required>


<option value="">Select</option>

<option value="DSL">DSL</option>

<option value="Fiber optic">
Fiber optic
</option>

<option value="No">No</option>


</select>


</div>






<!-- Online Security -->


<div class="form-group">


<label>

<i class="fa-solid fa-shield-halved"></i>

Online Security

</label>


<select id="OnlineSecurity" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No internet service">
No internet service
</option>


</select>


</div>






<!-- Online Backup -->

<div class="form-group">


<label>

<i class="fa-solid fa-cloud-arrow-up"></i>

Online Backup

</label>



<select id="OnlineBackup" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No internet service">
No internet service
</option>


</select>


</div>







<!-- Device Protection -->

<div class="form-group">


<label>

<i class="fa-solid fa-mobile-screen"></i>

Device Protection

</label>


<select id="DeviceProtection" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No internet service">
No internet service
</option>


</select>


</div>







<!-- Tech Support -->

<div class="form-group">


<label>

<i class="fa-solid fa-headset"></i>

Tech Support

</label>


<select id="TechSupport" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No internet service">
No internet service
</option>


</select>


</div>





<!-- Streaming TV -->


<div class="form-group">


<label>

<i class="fa-solid fa-tv"></i>

Streaming TV

</label>


<select id="StreamingTV" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No internet service">
No internet service
</option>


</select>


</div>






<!-- Streaming Movies -->

<div class="form-group">


<label>

<i class="fa-solid fa-film"></i>

Streaming Movies

</label>


<select id="StreamingMovies" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

<option value="No internet service">
No internet service
</option>


</select>


</div>






<!-- Contract -->

<div class="form-group">


<label>

<i class="fa-solid fa-file-contract"></i>

Contract

</label>



<select id="Contract" required>


<option value="">Select</option>

<option value="Month-to-month">
Month-to-month
</option>


<option value="One year">
One year
</option>


<option value="Two year">
Two year
</option>


</select>


</div>






<!-- Paperless Billing -->

<div class="form-group">


<label>

<i class="fa-solid fa-file-invoice"></i>

Paperless Billing

</label>


<select id="PaperlessBilling" required>


<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>


</select>


</div>






<!-- Payment -->


<div class="form-group">


<label>

<i class="fa-solid fa-credit-card"></i>

Payment Method

</label>



<select id="PaymentMethod" required>


<option value="">Select</option>


<option value="Electronic check">
Electronic check
</option>


<option value="Mailed check">
Mailed check
</option>


<option value="Bank transfer (automatic)">
Bank transfer (automatic)
</option>


<option value="Credit card (automatic)">
Credit card (automatic)
</option>


</select>


</div>






<!-- Monthly Charges -->


<div class="form-group">


<label>

<i class="fa-solid fa-dollar-sign"></i>

Monthly Charges ($)

</label>


<input

type="number"

id="MonthlyCharges"

step="0.01"

min="0"

placeholder="Example: 70.50"

required>


</div>







<!-- Total Charges -->


<div class="form-group total-charge">


<label>

<i class="fa-solid fa-money-bill-wave"></i>

Total Charges ($)

</label>



<input

type="number"

id="TotalCharges"

readonly

placeholder="Automatically calculated">



<small>

<i class="fa-solid fa-circle-info"></i>

Calculated automatically

</small>


</div>





</div>






<div class="button-group">



<button type="submit" class="predict-btn">


<i class="fa-solid fa-magnifying-glass-chart"></i>

Predict Churn


</button>




<button type="reset" class="reset-btn">


<i class="fa-solid fa-rotate-left"></i>

Reset


</button>



</div>




</form>






<div id="loading" class="loading">


<i class="fa-solid fa-spinner"></i>

Predicting...


</div>





<div id="result" class="result"></div>






</div>






<script src="{{ url_for('static', filename='js/script.js') }}"></script>



</body>


</html>
